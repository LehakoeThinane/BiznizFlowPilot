# Generic single-database configuration.

[alembic]
# path to migration scripts
script_location = .

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
#prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetimemodule.timezone(value) to create an aware datetime.
# Leave blank for localtime.
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by the revision command
# and, by default, truncated to 40
# set to 0 to disable truncation
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Logging configuration for Alembic can be performed by using the
# standard Python logging module setup functions before calling
# command.main() as such:
#
# from logging.config import fileConfig
# from alembic import command
#
# fileConfig('logging.ini')
# command.main()
#
# Alternatively, the configuration from the main configuration can
# be used and logging_name as used below
#
# logger_name = alembic

# level to log at when autorunning
# log_level = warn


# Logging configuration
[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
